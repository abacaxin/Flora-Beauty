<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido confirmado — Flora Boutique</title>
  <link rel="icon" type="image/x-icon" href="images/logo.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/carrinho.css">
</head>
<body>

  <!-- ── NAV ──────────────────────────────────────────────── -->
  <nav id="navbar" class="scrolled">
    <div class="nav-logo">
      <a href="index.html" id="logo-button">
        <img src="images/flora_logo_inicio.svg" alt="Flora Boutique">
      </a>
    </div>
    <div class="nav-actions">
      <div id="nav-carrinho-slot"></div>
      <div class="nav-account" id="nav-account">
        <a href="login.html" class="nav-account-btn" id="nav-account-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span id="nav-account-label">Entrar</span>
        </a>
      </div>
      <div id="theme-button">
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema claro e escuro">
          <span class="theme-icon theme-icon--moon">🌙</span>
          <span class="theme-icon theme-icon--sun">☀️</span>
          <span class="theme-toggle__circle"></span>
        </button>
      </div>
    </div>
  </nav>

  <main class="carrinho-main" style="text-align:center;">
    <div id="confirmacao-conteudo">
      <p class="carrinho-vazio">Carregando informações do pedido...</p>
    </div>
  </main>

  <script src="services/script.js"></script>
  <script type="module" src="services/nav-conta.js"></script>
  <script type="module" src="services/nav-carrinho.js"></script>
  <script type="module" src="js/pedido-confirmado.js"></script>
</body>
</html>
