<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revendedores — Painel Admin Flora Boutique</title>
  <link rel="icon" type="image/x-icon" href="../images/logo.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body data-theme="dark">

  <div class="admin-layout">
    <div id="admin-sidebar-slot"></div>

    <main class="admin-conteudo">
      <div class="admin-topo">
        <div>
          <h1>Revendedores</h1>
          <p id="contagem-revendedores"></p>
        </div>
      </div>

      <div class="admin-bloco">
        <h2>Pendentes de aprovação</h2>
        <div id="tabela-pendentes">
          <p class="admin-vazio">Carregando...</p>
        </div>
      </div>

      <div class="admin-bloco">
        <h2>Aprovados</h2>
        <div id="tabela-aprovados">
          <p class="admin-vazio">Carregando...</p>
        </div>
      </div>

      <div class="admin-bloco">
        <h2>Rejeitados</h2>
        <div id="tabela-rejeitados">
          <p class="admin-vazio">Carregando...</p>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/admin-sidebar.js"></script>
  <script src="../services/tema.js"></script>
  <script type="module" src="js/admin-revendedores.js"></script>
</body>
</html>
