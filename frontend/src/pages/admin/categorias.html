<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias — Painel Admin Flora Boutique</title>
  <link rel="icon" type="image/x-icon" href="../images/logo.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body data-theme="dark">

  <div class="admin-layout">
    <div id="admin-sidebar-slot"></div>

    <main class="admin-conteudo">
      <div class="admin-topo">
        <div>
          <h1>Categorias</h1>
          <p id="contagem-categorias"></p>
        </div>
        <button class="admin-btn admin-btn-primary" id="btn-nova-categoria">+ Nova categoria</button>
      </div>

      <div class="admin-bloco">
        <p style="font-size:0.8rem; color:var(--text-muted,#999); margin-bottom:1rem;">
          Categorias valem para varejo e atacado. O "identificador" (slug) é gerado a partir do nome
          e usado nos links de filtro — ele não muda mesmo se você renomear a categoria depois.
        </p>
        <div id="tabela-categorias">
          <p class="admin-vazio">Carregando categorias...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal de criar/editar categoria -->
  <div class="admin-modal-overlay" id="modal-categoria" style="display:none;">
    <div class="admin-modal" style="max-width:420px;">
      <h2 id="modal-categoria-titulo">Nova categoria</h2>
      <form id="form-categoria">
        <div class="admin-campo">
          <label for="cat-nome">Nome</label>
          <input type="text" id="cat-nome" required placeholder="Ex: Perfumes">
        </div>
        <div class="admin-campo">
          <label for="cat-imagem">Imagem de capa (opcional)</label>
          <input type="url" id="cat-imagem" placeholder="https://... (usada na seção 'Nossas categorias' da home)">
        </div>
        <p class="admin-msg" id="modal-categoria-msg" style="display:none;"></p>
        <div class="admin-modal-acoes">
          <button type="button" class="admin-btn admin-btn-outline" id="btn-cancelar-modal-categoria">Cancelar</button>
          <button type="submit" class="admin-btn admin-btn-primary" id="btn-salvar-categoria">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/admin-sidebar.js"></script>
  <script src="../services/tema.js"></script>
  <script type="module" src="js/admin-categorias.js"></script>
</body>
</html>
