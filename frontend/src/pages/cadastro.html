<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles/cadastro.css">
    <title>Flora Boutique — Cadastro</title>
</head>
<body>
    <main class="container">
        <form id="form-cadastro">
            <h1>Criar conta</h1>

            <div class="tipo-conta-toggle" id="tipo-conta-toggle">
                <button type="button" class="tipo-conta-btn active" data-tipo="cliente">Sou cliente</button>
                <button type="button" class="tipo-conta-btn" data-tipo="revendedor">Tenho uma loja</button>
            </div>
            <p class="tipo-conta-info" id="tipo-conta-info"></p>

            <div class="input-box">
                <input id="cad-nome" placeholder="Nome completo" type="text" required autocomplete="name">
                <i class="bx bxs-user-circle"></i>
            </div>
            <div class="input-box">
                <input id="cad-email" placeholder="E-mail" type="email" required autocomplete="email">
                <i class="bx bxs-user"></i>
            </div>

            <div id="campos-revendedor" style="display:none;">
                <div class="input-box">
                    <input id="cad-cnpj" placeholder="CNPJ (00.000.000/0000-00)" type="text" maxlength="18">
                    <i class="bx bxs-briefcase"></i>
                </div>
                <p class="cnpj-status" id="cnpj-status"></p>
                <div class="input-box">
                    <input id="cad-razao-social" placeholder="Razão social da empresa" type="text">
                    <i class="bx bxs-store"></i>
                </div>
            </div>

            <div class="input-box">
                <input id="cad-senha" placeholder="Senha (mín. 6 caracteres)" type="password" required autocomplete="new-password" minlength="6">
                <i class="bx bx-lock" id="toggle-senha"></i>
            </div>
            <div class="input-box">
                <input id="cad-confirma" placeholder="Confirme sua senha" type="password" required autocomplete="new-password" minlength="6">
                <i class="bx bx-lock" id="toggle-senha"></i>
            </div>

            <button type="submit" class="login" id="btn-cadastro">Cadastre-se</button>
            

            

            <button type="button" class="login login-google" id="btn-cadastro-google">
                <svg width="18" height="18" viewBox="0 0 18 18" style="vertical-align:middle; margin-right:8px;">
                    <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
                    <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
                    <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
                    <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                Continuar com Google
            </button>
            <p class="form-msg" id="cadastro-msg"></p>
            <p class="tipo-conta-info">Ao continuar com Google, sua conta é criada como cliente (sem CNPJ). Para revendedor, use o formulário acima.</p>

            <div class="register-link">
                <p>Já tem uma conta? <a href="./login.html">faça login</a></p>
            </div>
            <a href="./index.html" class="voltar-link">← Voltar para a loja</a>
        </form>
    </main>
    <script type="module" src="./js/cadastro.js"></script>
</body>
</html>
